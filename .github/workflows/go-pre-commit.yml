name: Pre-commit Checks

on:
  pull_request:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
  workflow_call:    
    inputs:
      go-version:
        description: 'Go version to use'
        required: false
        type: string
        default: '1.24'

permissions:
  contents: read

jobs:
  pre-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version || '1.24' }}   # uses caller input or falls back to default

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.0.2
          args: --help

      - name: Run pre-commit hooks
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files
