name: Python Pre-commit Checks

# Reusable workflow — call this from any Python repo that uses uv + pre-commit.
#
# Caller example:
#   jobs:
#     pre-commit:
#       uses: YOUR_ORG/YOUR_WORKFLOWS_REPO/.github/workflows/python-pre-commit.yml@main
#       with:
#         python-version: '3.12'
#         private-dependency-git-url: 'git@github.com:YOUR_ORG/private-lib.git'   # optional
#       secrets: inherit

on:
  workflow_call:
    inputs:
      python-version:
        description: 'Python version to use (e.g. "3.12")'
        type: string
        default: '3.12'
      uv-version:
        description: 'uv version to install'
        type: string
        default: '0.5.1'
      private-dependency-git-url:
        description: 'SSH clone URL for an optional private dependency (empty = skip clone)'
        type: string
        default: ''
      private-dependency-ref:
        description: 'Branch or tag to check out for the private dependency'
        type: string
        default: 'main'
      private-dependency-directory:
        description: 'Directory name next to the caller repo (sibling folder) where the dependency is cloned'
        type: string
        default: 'private-dependency'

permissions:
  contents: read

jobs:
  pre-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ inputs.python-version }}

      - name: Setup SSH key for private repos
        if: inputs.private-dependency-git-url != ''
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Clone private dependency (optional)
        if: inputs.private-dependency-git-url != ''
        env:
          DEP_URL: ${{ inputs.private-dependency-git-url }}
          DEP_REF: ${{ inputs.private-dependency-ref }}
          DEP_DIR: ${{ inputs.private-dependency-directory }}
        run: |
          cd ..
          if [ ! -d "$DEP_DIR" ]; then
            git clone -b "$DEP_REF" "$DEP_URL" "$DEP_DIR"
          else
            cd "$DEP_DIR"
            git fetch origin
            git checkout "$DEP_REF"
            git pull origin "$DEP_REF"
          fi
          cd "${{ github.workspace }}"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ inputs.uv-version }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run pre-commit hooks
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files
